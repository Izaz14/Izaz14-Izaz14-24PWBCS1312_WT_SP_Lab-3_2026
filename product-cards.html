<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Cards Demo</title>
<style>
body{font-family: Arial;background:#f4f4f4;padding:40px;}
.card-container{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;}
.card{width:250px;background:white;border:1px solid #ddd;border-radius:8px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.2);transition:0.3s;}
.card:hover{transform:translateY(-10px);box-shadow:0 10px 20px rgba(0,0,0,0.3);}
.card img{width:100%;height:160px;object-fit:cover;}
.card-content{padding:15px;}
.card-title{font-size:18px;margin-bottom:10px;}
.card-text{font-size:14px;color:#555;}
.btn{display:inline-block;margin-top:15px;padding:10px 15px;background:#3498db;color:white;text-decoration:none;border-radius:5px;transition:0.3s;}
.btn:hover{background:#2980b9;}
</style>
</head>
<body>
<h1 style="text-align:center;">Product / Service Cards</h1>
<div class="card-container">
<div class="card">
<img src="https://picsum.photos/300/200?1">
<div class="card-content">
<div class="card-title">Web Design</div>
<p class="card-text">Modern and responsive website design for your business.</p>
<a href="#" class="btn">Learn More</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<div class="card-content">
<div class="card-title">SEO Optimization</div>
<p class="card-text">Improve your search rankings and grow online traffic.</p>
<a href="#" class="btn">Learn More</a>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<div class="card-content">
<div class="card-title">Digital Marketing</div>
<p class="card-text">Promote your brand through social media campaigns.</p>
<a href="#" class="btn">Learn More</a>
</div>
</div>
</div>
</body>
</html>
