<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Transforms Showcase</title>
<style>
body{font-family: Arial;background:#f4f4f4;text-align:center;padding:40px;}
h1{margin-bottom:30px;}
.container{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;}
.box{width:150px;height:150px;background:#3498db;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:8px;transition:0.5s;}
.rotate:hover{transform:rotate(45deg);}
.scale:hover{transform:scale(1.3);}
.translate:hover{transform:translate(40px, 20px);}
.rotate3d:hover{transform:rotateY(180deg);}
.origin{transform-origin:top left;}
.origin:hover{transform:rotate(45deg);}
.combined:hover{transform:rotate(20deg) scale(1.2) translateY(-10px);}
.perspective{perspective:600px;}
</style>
</head>
<body>
<h1>CSS Transform Showcase</h1>
<div class="container">
<div class="box rotate">Rotate</div>

<div class="box scale">Scale</div>

<div class="box translate">Translate</div>
<div class="perspective">
<div class="box rotate3d">3D Rotate</div>
</div>

<div class="box origin">Origin</div>

<div class="box combined">Combined</div>
</div>
</body>
</html>
