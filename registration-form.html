<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Styled Registration Form</title>
<style>
body{
font-family: Arial;background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;}
.form-container{background:white;padding:30px;width:350px;border-radius:8px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
h2{text-align:center;}
input, select{width:100%;padding:10px;margin:8px 0 15px 0;border:2px solid #ccc;border-radius:5px;font-size:15px;transition:0.3s;}
input:focus, select:focus{border-color:#3498db;outline:none;box-shadow:0 0 5px rgba(52,152,219,0.5);}
button{width:100%;padding:12px;border:none;background:#3498db;color:white;font-size:16px;border-radius:5px;
cursor:pointer;transition:0.3s;}
button:hover{background:#2980b9;}
.error{border-color:red;}
.error-message{color:red;font-size:13px;}
.success{background:#2ecc71;color:white;padding:10px;text-align:center;border-radius:5px;margin-bottom:10px;}
</style>
</head>
<body>
<div class="form-container">
<h2>Registration Form</h2>
<div class="success">Registration Successful!</div>
<form>
<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" class="error" placeholder="Enter your email">
<div class="error-message">Invalid email address</div>

<label>Password</label>
<input type="password" placeholder="Enter password">

<label>Country</label>
<select>
<option>Select Country</option>
<option>Pakistan</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
</select>

<button type="submit">Register</button>
</form>
</div>
</body>
</html>
