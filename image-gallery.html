<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Styled Image Gallery</title>
<style>
body{font-family: Arial;background:#f4f4f4;text-align:center;}
h1{margin:20px;}
.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.image-box{position:relative;width:250px;overflow:hidden;}
.image-box img{width:100%;border-radius:15px;border:4px solid #333;box-shadow:0 5px 15px rgba(0,0,0,0.3); transition:0.5s;}
.circle img{border-radius:50%;}
.image-box img:hover{transform:scale(1.1);}
.grayscale img{filter:grayscale(100%);}
.blur img{filter:blur(2px);}
.brightness img{filter:brightness(130%);}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);color:white;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0;transition:0.5s;}
.image-box:hover .overlay{opacity:1;}
</style>
</head>
<body>
<h1>Styled Image Gallery</h1>
<div class="gallery">

<div class="image-box">
<img src="https://picsum.photos/300/200?1">
<div class="overlay">Nature</div>
</div>

<div class="image-box circle">
<img src="https://picsum.photos/300/200?2">
<div class="overlay">Circular Image</div>
</div>

<div class="image-box grayscale">
<img src="https://picsum.photos/300/200?3">
<div class="overlay">Grayscale Filter</div>
</div>

<div class="image-box blur">
<img src="https://picsum.photos/300/200?4">
<div class="overlay">Blur Filter</div>
</div>

<div class="image-box brightness">
<img src="https://picsum.photos/300/200?5">
<div class="overlay">Brightness Filter</div>
</div>
</div>
</body>
</html>
